name: PR Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and start preview environment
      run: |
        # Use a unique port for this PR
        PR_NUMBER=${{ github.event.number }}
        APP_PORT=$((8000 + $PR_NUMBER))
        
        # Create a custom docker-compose for this PR
        sed "s/8080:80/${APP_PORT}:80/g" docker-compose.yml > docker-compose.pr.yml
        
        # Start the environment
        docker compose -f docker-compose.pr.yml up -d
        
        # Wait for it to be ready
        timeout 60 bash -c "until curl -f http://localhost:${APP_PORT}/ > /dev/null 2>&1; do sleep 2; done"
        
        echo "Preview environment ready at http://localhost:${APP_PORT}"

    - name: Comment on PR
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.payload.number;
          const appPort = 8000 + prNumber;
          
          github.rest.issues.createComment({
            issue_number: prNumber,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🚀 **Preview Environment Ready!**
            
            Your PR has been deployed to a preview environment:
            - **Application**: http://localhost:${appPort}
            - **Database Admin**: http://localhost:8081 (if PHPMyAdmin is enabled)
            
            **Quick Start:**
            \`\`\`bash
            # Clone and test this PR locally:
            git checkout pr-${prNumber}
            docker compose up -d
            \`\`\`
            
            The preview will be automatically updated with new commits and cleaned up when the PR is closed.`
          });

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    
    steps:
    - name: Cleanup preview environment
      run: |
        echo "Cleaning up preview environment for PR #${{ github.event.number }}"
        # In a real deployment, this would clean up cloud resources
        # For now, we just log the cleanup action
        echo "Preview environment cleaned up"

    - name: Comment cleanup
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.payload.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🧹 Preview environment has been cleaned up since this PR was closed.`
          });